<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 空间审美探测器</title>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        .header { width: 100%; padding: 40px 20px 20px 20px; text-align: center; box-sizing: border-box; z-index: 10; }
        .progress-text { font-size: 14px; color: #888; margin-bottom: 8px; letter-spacing: 1px; }
        .progress-bar { width: 80%; height: 6px; background-color: #333; border-radius: 3px; margin: 0 auto; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background-color: #4CAF50; transition: width 0.3s ease; }
        .card-container { flex: 1; width: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        .card { width: 85%; max-width: 400px; height: 65vh; background-color: #222; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); background-size: cover; background-position: center; position: absolute; cursor: grab; touch-action: none; user-select: none; }
        .hint { position: absolute; bottom: 30px; color: #555; font-size: 14px; letter-spacing: 2px; }
        
        /* 客户完播后的优雅结束页 */
        .success-screen { display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; height: 100%; width: 100%; padding: 30px; box-sizing: border-box; }
        .check-icon { font-size: 60px; margin-bottom: 20px; }
        .success-screen h2 { color: #4CAF50; letter-spacing: 2px; }
        .success-screen p { color: #aaa; line-height: 1.6; font-size: 14px; }
    </style>
</head>
<body>

    <div id="swipe-view" style="width:100%; height:100%; display:flex; flex-direction:column;">
        <div class="header">
            <div class="progress-text">审美基因采样中：<span id="current-count">1</span> / <span id="total-count">5</span></div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
        <div class="card-container">
            <div class="hint">👈 左滑无感 | 右滑喜欢 👉</div>
            <div class="card" id="main-card"></div>
        </div>
    </div>

    <div class="success-screen" id="success-screen">
        <div class="check-icon">✨</div>
        <h2>采样已完成</h2>
        <p>系统已成功捕获您的潜意识审美偏好。<br>我们的主创团队正在融合提取您的专属设计DNA，请稍候片刻或联系您的专属设计师。</p>
    </div>

    <script>
        const seedPool = [
            { id: 101, url: "https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?auto=format&fit=crop&w=500&q=80", tags: ["极简", "无主灯", "微水泥"] },
            { id: 102, url: "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=500&q=80", tags: ["中古风", "原木"] },
            { id: 103, url: "https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?auto=format&fit=crop&w=500&q=80", tags: ["侘寂风", "微水泥"] },
            { id: 104, url: "https://images.unsplash.com/photo-1554995207-c18c203602cb?auto=format&fit=crop&w=500&q=80", tags: ["极简", "现代", "大平层"] },
            { id: 105, url: "https://images.unsplash.com/photo-1598928506311-c55dd58021cb?auto=format&fit=crop&w=500&q=80", tags: ["中古风", "复古"] }
        ];

        let currentIndex = 0;
        const totalCards = seedPool.length;
        const userActionLog = []; 
        let cardLoadTime = 0;

        const cardElement = document.getElementById('main-card');
        document.getElementById('total-count').innerText = totalCards;

        let isDragging = false, startX = 0, currentX = 0;

        cardElement.addEventListener('pointerdown', (e) => {
            if (currentIndex >= totalCards) return;
            isDragging = true; startX = e.clientX; 
            cardElement.style.transition = 'none';
            cardElement.setPointerCapture(e.pointerId);
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            currentX = e.clientX - startX;
            cardElement.style.transform = `translate(${currentX}px, 0px) rotate(${currentX * 0.05}deg)`;
        });

        document.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            cardElement.style.transition = 'transform 0.4s ease, opacity 0.4s ease';

            if (currentX > 100) swipe('LIKE'); 
            else if (currentX < -100) swipe('DISLIKE'); 
            else cardElement.style.transform = `translate(0px, 0px) rotate(0deg)`;
            currentX = 0;
        });

        function swipe(action) {
            cardElement.style.transform = `translate(${action === 'LIKE' ? 1000 : -1000}px, 0px) rotate(${action === 'LIKE' ? 30 : -30}deg)`;
            cardElement.style.opacity = '0';
            
            userActionLog.push({ id: seedPool[currentIndex].id, tags: seedPool[currentIndex].tags, action: action, duration: Date.now() - cardLoadTime });
            
            setTimeout(() => { currentIndex++; updateCard(); }, 300);
        }

        function updateCard() {
            if (currentIndex < totalCards) {
                cardElement.style.transition = 'none';
                cardElement.style.transform = 'translate(0px, 0px) rotate(0deg)';
                cardElement.style.backgroundImage = `url('${seedPool[currentIndex].url}')`;
                cardLoadTime = Date.now();
                setTimeout(() => { cardElement.style.transition = 'opacity 0.3s ease'; cardElement.style.opacity = '1'; }, 50);
                document.getElementById('current-count').innerText = currentIndex + 1;
                document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / totalCards) * 100}%`;
            } else {
                finishSession();
            }
        }

function finishSession() {
            document.getElementById('swipe-view').style.display = 'none';
            document.getElementById('success-screen').style.display = 'flex';

            const payload = {
                client: "Client_VIP",
                logs: userActionLog
            };

            console.log("正在发送数据...");
            
            // 把这里换成你在 webhook.site 复制的真实链接
            fetch('https://webhook.site/5282a04c-63fc-48eb-83be-ad86b732bd3e', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(response => console.log("数据发送成功！"));
        }

        updateCard();
    </script>
</body>
</html>
