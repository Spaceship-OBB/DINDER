<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 空间审美探测器 - 滑动版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 顶部进度条区 */
        .header {
            width: 100%;
            padding: 40px 20px 20px 20px;
            text-align: center;
            box-sizing: border-box;
            z-index: 10;
        }
        .progress-text {
            font-size: 14px;
            font-weight: bold;
            color: #888;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .progress-bar {
            width: 80%;
            height: 6px;
            background-color: #333;
            border-radius: 3px;
            margin: 0 auto;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: #4CAF50;
            transition: width 0.3s ease;
        }

        /* 卡片展示区 */
        .card-container {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 卡片本体样式 */
        .card {
            width: 85%;
            max-width: 400px;
            height: 65vh;
            background-color: #222;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            background-size: cover;
            background-position: center;
            position: absolute;
            cursor: grab;
            /* 禁用移动端的默认滑动行为和长按菜单 */
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
        }
        .card:active {
            cursor: grabbing;
        }

        /* 操作提示层 */
        .hint {
            position: absolute;
            bottom: 30px;
            color: #555;
            font-size: 14px;
            letter-spacing: 2px;
            pointer-events: none;
        }

        /* 终局弹窗 */
        .finale-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="progress-text">审美基因采样中：<span id="current-count">1</span> / <span id="total-count">5</span></div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div class="card-container">
        <div class="hint">👈 左滑淘汰 &nbsp;&nbsp;|&nbsp;&nbsp; 右滑想要 👉</div>
        <div class="card" id="main-card"></div>
    </div>

    <div class="finale-screen" id="finale-screen">
        <div class="loader"></div>
        <h2>采样完成</h2>
        <p style="color: #aaa; margin-top: 10px;">系统已捕获您的审美偏好。</p>
        <p style="color: #4CAF50; font-weight: bold; margin-top: 20px; font-size: 18px;">提取最大公约数：<br><br>["极简", "大平层", "无主灯", "冷色调"]</p>
        <p style="color: #fff; margin-top: 40px; font-size: 14px; color: #888;">正在呼叫大模型生成最终情绪板...</p>
    </div>

    <script>
        // 阶段一：初始种子池
        const seedPool = [
            "https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?auto=format&fit=crop&w=800&q=80",
            "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=800&q=80",
            "https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?auto=format&fit=crop&w=800&q=80",
            "https://images.unsplash.com/photo-1554995207-c18c203602cb?auto=format&fit=crop&w=800&q=80",
            "https://images.unsplash.com/photo-1598928506311-c55dd58021cb?auto=format&fit=crop&w=800&q=80"
        ];

        let currentIndex = 0;
        const totalCards = seedPool.length;
        const likedImages = [];

        const cardElement = document.getElementById('main-card');
        const progressFill = document.getElementById('progress-fill');
        const currentCountText = document.getElementById('current-count');
        const totalCountText = document.getElementById('total-count');
        const finaleScreen = document.getElementById('finale-screen');

        totalCountText.innerText = totalCards;

        // 滑动交互状态变量
        let isDragging = false;
        let startX = 0, startY = 0;
        let currentX = 0, currentY = 0;
        const SWIPE_THRESHOLD = 100; // 决定滑出卡片的判定距离 (px)

        // 监听鼠标和触摸事件 (Pointer Events 可以同时兼容电脑鼠标和手机触摸)
        cardElement.addEventListener('pointerdown', startDrag);
        document.addEventListener('pointermove', drag);
        document.addEventListener('pointerup', endDrag);

        function startDrag(e) {
            if (currentIndex >= totalCards) return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            
            // 拖拽时取消动画过渡，做到指尖跟手
            cardElement.style.transition = 'none';
            // 强制捕获指针，防止滑动过快时脱离目标
            cardElement.setPointerCapture(e.pointerId);
        }

        function drag(e) {
            if (!isDragging) return;
            
            // 计算手指/鼠标移动的偏移量
            currentX = e.clientX - startX;
            currentY = e.clientY - startY;
            
            // 随着拖拽距离增加，给卡片加上微微倾斜的旋转效果 (更具物理感)
            const rotate = currentX * 0.05; 
            
            cardElement.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotate}deg)`;
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            // 松手时恢复动画过渡效果
            cardElement.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease';

            // 判定是否超过滑动阈值
            if (currentX > SWIPE_THRESHOLD) {
                swipeOut('right');
            } else if (currentX < -SWIPE_THRESHOLD) {
                swipeOut('left');
            } else {
                // 如果没滑过阈值，自动弹回中心
                cardElement.style.transform = `translate(0px, 0px) rotate(0deg)`;
            }
            
            // 重置偏移量
            currentX = 0;
            currentY = 0;
        }

        function swipeOut(direction) {
            // 决定卡片飞出的远方坐标
            const screenWidth = window.innerWidth;
            const flyOutX = direction === 'right' ? screenWidth : -screenWidth;
            const rotateOut = direction === 'right' ? 30 : -30;

            cardElement.style.transform = `translate(${flyOutX}px, ${currentY}px) rotate(${rotateOut}deg)`;
            cardElement.style.opacity = '0';

            // 记录右滑数据
            if (direction === 'right') {
                likedImages.push(seedPool[currentIndex]);
            }

            // 等待卡片飞出动画结束后，刷新下一张
            setTimeout(() => {
                currentIndex++;
                updateCard();
            }, 300);
        }

        function updateCard() {
            if (currentIndex < totalCards) {
                // 加载新卡片
                cardElement.style.transition = 'none'; // 瞬间归位，不要动画
                cardElement.style.transform = 'translate(0px, 0px) rotate(0deg)';
                cardElement.style.backgroundImage = `url('${seedPool[currentIndex]}')`;
                
                // 延迟一点点恢复 opacity，形成新卡片出现的顺滑感
                setTimeout(() => {
                    cardElement.style.transition = 'opacity 0.3s ease';
                    cardElement.style.opacity = '1';
                }, 50);
                
                // 更新进度条
                currentCountText.innerText = currentIndex + 1;
                progressFill.style.width = `${((currentIndex + 1) / totalCards) * 100}%`;
            } else {
                triggerFinale();
            }
        }

        function triggerFinale() {
            document.querySelector('.header').style.display = 'none';
            document.querySelector('.card-container').style.display = 'none';
            finaleScreen.style.display = 'flex';
            
            console.log("最终成功捕获客户审美的图片库：", likedImages);
        }

        // 初始化运行系统
        updateCard();
    </script>
</body>
</html>
